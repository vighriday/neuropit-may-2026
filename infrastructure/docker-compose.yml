version: '3.8'

services:
  # --------------------------------------------------------
  # EVENT STREAMING: Redpanda (Kafka Alternative)
  # --------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: neuropit-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "8081:8081"
      - "8082:8082"
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 3s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: neuropit-redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  # --------------------------------------------------------
  # TIME-SERIES DB: InfluxDB (Local fallback/testing)
  # --------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: neuropit-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=neuropit_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=neuropit_secure_pass_2026
      - DOCKER_INFLUXDB_INIT_ORG=neuropit
      - DOCKER_INFLUXDB_INIT_BUCKET=neuropit-telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=neuropit-local-dev-token-999
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  # --------------------------------------------------------
  # VECTOR DB: Qdrant (Local fallback/testing)
  # --------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: neuropit-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  redpanda-data:
  influxdb-data:
  influxdb-config:
  qdrant-data:
