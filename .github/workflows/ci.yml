name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-unit:
    name: Backend unit suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what the unit suite needs. The unit suite never
          # downloads model weights, never starts brokers, and never talks
          # to the watsonx endpoint. Keeps CI fast and predictable.
          pip install \
            pydantic==2.5.3 \
            pydantic-settings==2.1.0 \
            python-dotenv==1.0.0 \
            numpy==1.26.2 \
            scipy==1.11.4 \
            scikit-learn==1.4.0 \
            confluent-kafka==2.3.0 \
            influxdb-client==1.39.0 \
            qdrant-client==1.7.0 \
            httpx==0.26.0 \
            fastapi==0.108.0 \
            python-jose[cryptography]==3.3.0 \
            cryptography==42.0.5 \
            pytest==8.0.0 \
            pytest-mock==3.12.0

      - name: Run unit suite
        run: pytest tests/unit

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Type check
        working-directory: src/frontend
        run: npx tsc --noEmit
